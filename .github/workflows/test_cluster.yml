name: Cluster Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - "nightly"
          - "v1.2.889-nightly"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }} # Value of the GPG private key to import
          gpg-passphrase: MAVEN_GPG_PASSPHRASE # env variable for GPG private key passphrase

      - name: Start Cluster With Nginx and Minio
        working-directory: tests
        run: make up
        env:
          DATABEND_QUERY_VERSION: ${{ matrix.version }}

      - name: Run Non-IT Tests
        working-directory: tests
        run: make test TEST_MVN_ARGS='-DexcludedGroups=FLAKY,IT,UNIT_ARROW'
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          DATABEND_TEST_CONN_PORT: 8000
          DATABEND_QUERY_VERSION: ${{ matrix.version }}

      - name: Run UNIT_ARROW Tests
        working-directory: tests
        run: make test TEST_MVN_ARGS='-Parrow-tests -DexcludedGroups=FLAKY'
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          DATABEND_TEST_CONN_PORT: 8000
          DATABEND_QUERY_VERSION: ${{ matrix.version }}

      - name: Run IT Tests
        working-directory: tests
        run: make test TEST_MVN_ARGS='-Dgroups=IT -DexcludedGroups=FLAKY'
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          DATABEND_TEST_CONN_PORT: 8000
          DATABEND_QUERY_VERSION: ${{ matrix.version }}

      - name: Run Arrow IT Tests
        working-directory: tests
        run: make test TEST_MVN_ARGS='-Dgroups=IT -DexcludedGroups=FLAKY'
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          DATABEND_TEST_CONN_PORT: 8000
          DATABEND_QUERY_VERSION: ${{ matrix.version }}
          DATABEND_JDBC_TEST_QUERY_RESULT_FORMAT: arrow
